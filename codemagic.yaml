# Simple Codemagic configuration for iOS build only
# Basic setup without complex integrations

workflows:
  ios-build:
    name: iOS Build - gazago-app
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'develop'
          include: true
          source: true
    
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: kr.co.eztechfin.gazaGo.dev
      
      vars:
        FLUTTER_VERSION: 3.19.6
      
      flutter: $FLUTTER_VERSION
      xcode: latest
      cocoapods: default
    
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    
    artifacts:
      - build/ios/ipa/*.ipa
      - build/**/*.app
      - flutter_drive.log